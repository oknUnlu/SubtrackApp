<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111827; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; padding: 12px; }
  .grid { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }
  .cell { background: #1f2937; border-radius: 10px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .emoji { font-size: 20px; }
  .name { font-size: 8px; color: #6b7280; text-align: center; font-weight: 500; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="emoji">🍔</div><div class="name">Food</div></div>
    <div class="cell"><div class="emoji">🚗</div><div class="name">Transport</div></div>
    <div class="cell"><div class="emoji">🎮</div><div class="name">Fun</div></div>
    <div class="cell"><div class="emoji">🛍️</div><div class="name">Shopping</div></div>
    <div class="cell"><div class="emoji">📄</div><div class="name">Bills</div></div>
    <div class="cell"><div class="emoji">💊</div><div class="name">Health</div></div>
    <div class="cell"><div class="emoji">📚</div><div class="name">Education</div></div>
    <div class="cell"><div class="emoji">💻</div><div class="name">Tech</div></div>
    <div class="cell"><div class="emoji">📌</div><div class="name">Other</div></div>
    <div class="cell"><div class="emoji">🛒</div><div class="name">Groceries</div></div>
    <div class="cell"><div class="emoji">🏠</div><div class="name">Rent</div></div>
    <div class="cell"><div class="emoji">⛽</div><div class="name">Fuel</div></div>
    <div class="cell"><div class="emoji">👕</div><div class="name">Clothing</div></div>
    <div class="cell"><div class="emoji">💄</div><div class="name">Beauty</div></div>
    <div class="cell"><div class="emoji">⚽</div><div class="name">Sports</div></div>
    <div class="cell"><div class="emoji">🐾</div><div class="name">Pets</div></div>
    <div class="cell"><div class="emoji">🎁</div><div class="name">Gifts</div></div>
    <div class="cell"><div class="emoji">✈️</div><div class="name">Travel</div></div>
    <div class="cell"><div class="emoji">🛡️</div><div class="name">Insurance</div></div>
    <div class="cell"><div class="emoji">🏛️</div><div class="name">Taxes</div></div>
    <div class="cell"><div class="emoji">🏦</div><div class="name">Savings</div></div>
    <div class="cell"><div class="emoji">❤️</div><div class="name">Charity</div></div>
    <div class="cell"><div class="emoji">👶</div><div class="name">Kids</div></div>
    <div class="cell"><div class="emoji">🔧</div><div class="name">Home</div></div>
    <div class="cell"><div class="emoji">☕</div><div class="name">Coffee</div></div>
    <div class="cell"><div class="emoji">📱</div><div class="name">Subscriptions</div></div>
    <div class="cell"><div class="emoji">🅿️</div><div class="name">Parking</div></div>
  </div>
</body>
</html>
