<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111827; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 9px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing:.06em; }
  .toast { border-radius: 16px; padding: 13px 16px; display: flex; align-items: center; gap: 12px; }
  .icon-wrap { width: 36px; height: 36px; border-radius: 18px; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .msg { color: #fff; font-weight: 700; font-size: 14px; }
  .sub { color: rgba(255,255,255,.8); font-size: 11px; margin-top: 2px; }
  .close { margin-left: auto; color: rgba(255,255,255,.6); font-size: 16px; }
</style>
</head>
<body>
  <div class="label">Success Toast</div>
  <div class="toast" style="background:#22c55e">
    <div class="icon-wrap">✓</div>
    <div><div class="msg">Expense saved</div></div>
    <div class="close">✕</div>
  </div>
  <div class="label">Warning Toast (Budget exceeded)</div>
  <div class="toast" style="background:#f59e0b">
    <div class="icon-wrap">⚠</div>
    <div>
      <div class="msg">Expense saved</div>
      <div class="sub">⚠️ Monthly budget exceeded! (103%)</div>
      <div class="sub">⚠️ Food: 95% of budget used</div>
    </div>
    <div class="close">✕</div>
  </div>
</body>
</html>
