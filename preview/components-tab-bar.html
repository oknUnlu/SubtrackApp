<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111827;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .label { font-size: 9px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .06em; }
  .tab-bar {
    background: #1f2937;
    border-top: 1px solid #374151;
    border-radius: 20px;
    display: flex;
    align-items: flex-end;
    padding: 0 8px 14px;
    height: 72px;
    position: relative;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding-top: 10px;
  }
  .tab-label { font-size: 10px; font-weight: 500; }
  .fab-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .fab {
    width: 52px; height: 52px;
    border-radius: 26px;
    background: #22c55e;
    display: flex; align-items: center; justify-content: center;
    margin-top: -26px;
    box-shadow: 0 4px 16px rgba(34,197,94,.45);
  }
</style>
</head>
<body>
  <div class="label">Bottom Tab Bar — Active: Home</div>
  <div class="tab-bar">
    <div class="tab">
      <ion-icon name="home" style="font-size:22px;color:#22c55e"></ion-icon>
      <span class="tab-label" style="color:#22c55e">Home</span>
    </div>
    <div class="tab">
      <ion-icon name="card-outline" style="font-size:22px;color:#6b7280"></ion-icon>
      <span class="tab-label" style="color:#6b7280">Subs</span>
    </div>
    <div class="fab-col">
      <div class="fab">
        <ion-icon name="add" style="font-size:28px;color:#fff"></ion-icon>
      </div>
    </div>
    <div class="tab">
      <ion-icon name="analytics-outline" style="font-size:22px;color:#6b7280"></ion-icon>
      <span class="tab-label" style="color:#6b7280">Smart Tips</span>
    </div>
    <div class="tab">
      <ion-icon name="settings-outline" style="font-size:22px;color:#6b7280"></ion-icon>
      <span class="tab-label" style="color:#6b7280">Settings</span>
    </div>
  </div>
</body>
</html>
