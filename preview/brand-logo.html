<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111827; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; padding: 14px; }
  .row { display: flex; gap: 16px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .logo-bg { display: flex; align-items: center; justify-content: center; border-radius: 22px; }
  .label { font-size: 9px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing:.06em; margin-bottom: 8px; }
  .wordmark { display: flex; align-items: center; gap: 10px; }
  .wm-text { font-size: 28px; font-weight: 800; color: #f9fafb; }
</style>
</head>
<body>
  <div class="label">App Icon</div>
  <div class="row">
    <!-- Large icon -->
    <svg width="80" height="80" viewBox="0 0 100 100">
      <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#22c55e"/>
      <path d="M 35 25 C 50 25, 68 28, 68 42 C 68 52, 55 55, 45 55" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 50 48 L 43 55 L 50 62" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 65 75 C 50 75, 32 72, 32 58 C 32 48, 45 45, 55 45" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 50 38 L 57 45 L 50 52" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <!-- Medium -->
    <svg width="48" height="48" viewBox="0 0 100 100">
      <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#22c55e"/>
      <path d="M 35 25 C 50 25, 68 28, 68 42 C 68 52, 55 55, 45 55" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 50 48 L 43 55 L 50 62" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 65 75 C 50 75, 32 72, 32 58 C 32 48, 45 45, 55 45" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 50 38 L 57 45 L 50 52" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <!-- Small -->
    <svg width="32" height="32" viewBox="0 0 100 100">
      <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#22c55e"/>
      <path d="M 35 25 C 50 25, 68 28, 68 42 C 68 52, 55 55, 45 55" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 50 48 L 43 55 L 50 62" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 65 75 C 50 75, 32 72, 32 58 C 32 48, 45 45, 55 45" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 50 38 L 57 45 L 50 52" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="label">Wordmark</div>
  <div class="wordmark">
    <svg width="40" height="40" viewBox="0 0 100 100">
      <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#22c55e"/>
      <path d="M 35 25 C 50 25, 68 28, 68 42 C 68 52, 55 55, 45 55" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 50 48 L 43 55 L 50 62" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M 65 75 C 50 75, 32 72, 32 58 C 32 48, 45 45, 55 45" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <path d="M 50 38 L 57 45 L 50 52" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="wm-text">SubTrack</div>
  </div>
  <div style="margin-top:10px">
    <div class="label">On light</div>
    <div class="wordmark" style="background:#f6f7f9;padding:10px 14px;border-radius:12px">
      <svg width="32" height="32" viewBox="0 0 100 100">
        <rect x="0" y="0" width="100" height="100" rx="22" ry="22" fill="#22c55e"/>
        <path d="M 35 25 C 50 25, 68 28, 68 42 C 68 52, 55 55, 45 55" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
        <path d="M 50 48 L 43 55 L 50 62" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M 65 75 C 50 75, 32 72, 32 58 C 32 48, 45 45, 55 45" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
        <path d="M 50 38 L 57 45 L 50 52" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div class="wm-text" style="color:#222">SubTrack</div>
    </div>
  </div>
</body>
</html>
