<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111827; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .label { font-size: 9px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing:.06em; margin-top: 2px; }
  .input { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 10px 12px; color: #f9fafb; font-size: 14px; font-family: inherit; }
  .input-focus { background: #1f2937; border: 1px solid #22c55e; border-radius: 10px; padding: 10px 12px; color: #22c55e; font-size: 22px; font-weight: 700; font-family: inherit; }
  .placeholder { color: #6b7280; }
  .input-row { display: flex; align-items: center; background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 10px 12px; gap: 8px; }
  .icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #9ca3af; }
  .picker { background: #1f2937; border: 1px solid #374151; border-radius: 10px; padding: 10px 12px; color: #f9fafb; font-size: 14px; display: flex; justify-content: space-between; }
</style>
</head>
<body>
  <div class="label">Text Input — Default</div>
  <div class="input"><span class="placeholder">E.g: Coffee, Grocery shopping…</span></div>
  <div class="label">Amount Input — Active</div>
  <div class="input-focus">₺45.00</div>
  <div class="label">Input with Icon</div>
  <div class="input-row">
    <div class="icon">📅</div>
    <span style="color:#6b7280;font-size:14px">Select a date</span>
    <span style="margin-left:auto;color:#9ca3af;font-size:14px">›</span>
  </div>
  <div class="label">Picker / Selector</div>
  <div class="picker">
    <span>Netflix</span><span style="color:#6b7280">▾</span>
  </div>
  <div class="label">Textarea — Notes</div>
  <div class="input" style="min-height:54px;color:#9ca3af">Add a note…</div>
</body>
</html>
