<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390,initial-scale=1">
<title>SubTrack — QuickAdd (EN)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:390px;height:844px;overflow:hidden;background:linear-gradient(160deg,#0d0a04 0%,#171005 40%,#0a0802 100%)}
body{font-family:'Inter',-apple-system,system-ui,sans-serif;display:flex;align-items:center;justify-content:center}
.card{width:390px;height:844px;position:relative;display:flex;flex-direction:column;align-items:center;padding:38px 28px 30px;isolation:isolate;overflow:hidden;background:linear-gradient(160deg,#0d0a04 0%,#171005 40%,#0a0802 100%)}
.glow{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
/* Phone */
.phone{width:168px;height:338px;border-radius:32px;border:1.5px solid rgba(255,255,255,.13);box-shadow:0 0 0 1px rgba(0,0,0,.8),0 28px 80px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.08);overflow:hidden;flex-shrink:0;position:relative;margin-bottom:20px;z-index:2}
.phone-inner{position:absolute;inset:0;border-radius:31px;overflow:hidden;display:flex;flex-direction:column}
.island{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:58px;height:15px;background:#000;border-radius:20px;z-index:30}
.sb{flex:1;overflow:hidden;display:flex;flex-direction:column}
/* Headline */
.headline{text-align:center;z-index:2;margin-bottom:20px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 13px;border-radius:100px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:11px}
.bdot{width:5px;height:5px;border-radius:50%}
.title{font-size:28px;font-weight:900;line-height:1.07;letter-spacing:-.8px;color:#fff}
.sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:8px;line-height:1.5;font-weight:500}
/* Pills */
.pills{display:flex;flex-direction:column;gap:7px;width:100%;margin-top:auto;z-index:2}
.pill{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:16px;font-size:11px;font-weight:600}
.pi{width:26px;height:26px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
/* Mini UI */
.uc{border-radius:10px;padding:7px 8px;margin-bottom:4px}
.ur{display:flex;align-items:center;border-radius:8px;padding:5px 7px;margin-bottom:3px}
.bar{height:3px;border-radius:2px;overflow:hidden}
.bf{height:100%;border-radius:2px}
</style>

</head>
<body>
<div class="card">

  <div class="glow" style="width:320px;height:270px;background:#f59e0b;opacity:.12;top:-80px;right:-40px"></div><div class="glow" style="width:190px;height:190px;background:#fbbf24;opacity:.06;bottom:70px;left:-20px"></div>
  <div class="headline">
    <div class="badge" style="background:rgba(245,158,11,.12);color:#fcd34d;border:1px solid rgba(245,158,11,.2)">
      <div class="bdot" style="background:#fcd34d"></div>
      Quick Add
    </div>
    <div class="title">Log expenses<br>in <em style="color:#f59e0b">seconds</em></div>
    <div class="sub">Categories, tags, receipts<br>& installments</div>
  </div>
  <div class="phone" style="background:#110d02">
    
    <div class="island"></div>
    <div class="phone-inner" style="background:#151005;padding-top:28px">
      <div class="sb" style="padding:0 8px 6px;overflow:hidden">
        <div style="text-align:center;margin-bottom:8px">
          <div style="font-size:5px;color:#6b7280;margin-bottom:2px">Amount</div>
          <div style="font-size:26px;font-weight:900;color:#fbbf24;letter-spacing:-1.5px">₺ 285</div>
          <div style="width:40%;height:2px;background:#f59e0b;border-radius:1px;margin:4px auto 0;opacity:.6"></div>
        </div>
        <div style="font-size:5.5px;font-weight:700;color:#fcd34d;margin-bottom:4px">Category</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:5px">
          <div style="background:#22c55e;border-radius:8px;padding:5px 2px;text-align:center"><div style="font-size:10px;margin-bottom:1px">🍔</div><div style="font-size:4px;color:#fff;font-weight:600">Food</div></div>
          <div style="background:#1f1a0a;border-radius:8px;padding:5px 2px;text-align:center;border:1px solid rgba(245,158,11,.15)"><div style="font-size:10px;margin-bottom:1px">🚗</div><div style="font-size:4px;color:#6b7280;font-weight:500">Transport</div></div>
          <div style="background:#1f1a0a;border-radius:8px;padding:5px 2px;text-align:center;border:1px solid rgba(245,158,11,.15)"><div style="font-size:10px;margin-bottom:1px">🛍️</div><div style="font-size:4px;color:#6b7280;font-weight:500">Shop</div></div>
          <div style="background:#1f1a0a;border-radius:8px;padding:5px 2px;text-align:center;border:1px solid rgba(245,158,11,.15)"><div style="font-size:10px;margin-bottom:1px">💊</div><div style="font-size:4px;color:#6b7280;font-weight:500">Health</div></div>
        </div>
        <div style="background:#1f1a0a;border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:5px 7px;margin-bottom:4px;display:flex;align-items:center;gap:4px"><div style="font-size:9px">✏️</div><div style="font-size:5px;color:#6b7280">Lunch with team</div></div>
        <div style="background:#1f1a0a;border:1px solid rgba(245,158,11,.15);border-radius:8px;padding:5px 7px;margin-bottom:4px;display:flex;align-items:center;gap:4px"><div style="font-size:9px">💳</div><div style="flex:1;font-size:5px;color:#9ca3af">Installments (3 months)</div><div style="width:22px;height:12px;background:#f59e0b;border-radius:6px;position:relative"><div style="width:10px;height:10px;background:#fff;border-radius:5px;position:absolute;right:1px;top:1px"></div></div></div>
        <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px"><div style="background:rgba(245,158,11,.15);border-radius:100px;padding:2px 7px;font-size:4.5px;color:#fcd34d;font-weight:600">work</div><div style="background:rgba(245,158,11,.15);border-radius:100px;padding:2px 7px;font-size:4.5px;color:#fcd34d;font-weight:600">weekday</div><div style="background:rgba(255,255,255,.05);border-radius:100px;padding:2px 7px;font-size:4.5px;color:#6b7280">+ tag</div></div>
        <div style="background:#f59e0b;border-radius:10px;padding:8px;text-align:center"><div style="font-size:7px;font-weight:800;color:#000">Save Expense</div></div>
      </div>
    </div>

  </div>
  <div class="pills"><div class="pill" style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15)"><div class="pi" style="background:rgba(245,158,11,.15)">📸</div><span style="color:#fcd34d">Receipt photo capture</span></div><div class="pill" style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15)"><div class="pi" style="background:rgba(245,158,11,.15)">💳</div><span style="color:#fcd34d">Installment tracking</span></div></div>

</div>
</body>
</html>
